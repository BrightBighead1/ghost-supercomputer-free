name: search_docs
description: Search project documentation via Suga Meilisearch
input_schema:
  properties:
    query:
      type: string
      description: Search query
    index:
      type: string
      description: Meilisearch index name (default: ghost-docs)
    limit:
      type: number
      description: Max results (default: 10)
  required: [query]
implementation:
  script: scripts/search.sh
  runtime: sh
