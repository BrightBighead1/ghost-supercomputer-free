name: upload_file
description: Upload a file to Suga MinIO storage
input_schema:
  properties:
    file_path:
      type: string
      description: Local file path to upload
    key:
      type: string
      description: MinIO object key (destination path)
    content_type:
      type: string
      description: MIME type (default: application/octet-stream)
  required: [file_path, key]
implementation:
  script: scripts/upload_minio.sh
  runtime: sh
