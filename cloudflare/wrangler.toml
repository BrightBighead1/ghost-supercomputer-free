name = "ghost-supercomputer"
main = "worker.js"
compatibility_date = "2024-12-01"

# KV namespace for usage tracking
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

# R2 bucket for file storage
[[r2_buckets]]
binding = "R2"
bucket_name = "ghost-storage"

# Vectorize index for semantic search
[[vectorize]]
binding = "VECTORIZE"
index_name = "ghost-agent-vectors"

# Workers AI for embeddings
[ai]
binding = "AI"

# Environment variables (set via wrangler secret put)
# SUGA_HOST = your-suga-app-url
# SUGA_PORT = 3333
# R2_PUBLIC_URL = https://your-r2-bucket.r2.dev

# Routes (uncomment when using custom domain)
# routes = [
#   { pattern = "ghost.yourdomain.com/api/*", zone_name = "yourdomain.com" }
# ]

# Limits
[limits]
cpu_ms = 10
