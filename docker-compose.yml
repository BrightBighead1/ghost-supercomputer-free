name: ghost-supercomputer

x-common-env: &common-env
  GHOST_ENV: ${GHOST_ENV:-production}
  TZ: ${TZ:-UTC}

networks:
  ghost:
    driver: bridge

services:
  # ============================================================
  # GitAgent — AI Agent Framework
  # The only custom service; all infra is Suga-native
  # ============================================================
  gitagent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: ghost-gitagent
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      <<: *common-env
      GITAGENT_DIR: /app/agent
      # LLM (via Suga LiteLLM)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LITELLM_URL: ${LITELLM_URL:-http://litellm:4000}
      # Database (Suga PostgreSQL)
      NEON_DATABASE_URL: ${DATABASE_URL}
      # Auth + Files (Suga PocketBase)
      SUPABASE_URL: ${POCKETBASE_URL:-http://pocketbase:8090}
      SUPABASE_ANON_KEY: ${POCKETBASE_ANON_KEY:-}
      # Object Storage (Suga MinIO)
      CF_R2_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      CF_R2_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-}
      CF_R2_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-}
      CF_R2_BUCKET: ghost-storage
      # Search (Suga Meilisearch)
      MEILI_URL: ${MEILI_URL:-http://meilisearch:7700}
      MEILI_API_KEY: ${MEILI_MASTER_KEY:-}
    networks:
      - ghost
    deploy:
      resources:
        limits:
          memory: 384M
